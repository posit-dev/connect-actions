name: Deploy to Posit Connect
description: Deploy an application to Posit Connect. Supports production deploys and draft PR previews.

inputs:
  connect-server:
    description: Connect server URL (can be read from deployment-file)
    required: false
  connect-api-key:
    description: >-
      Connect API key. If omitted, the action exchanges a GitHub OIDC token for
      a short-lived key via trusted publishing, which requires 'id-token: write'
      permission and a trusted publisher configured for this content on Connect.
    required: false
  audience:
    description: >-
      Audience to request for the GitHub OIDC token when connect-api-key is not
      set. Must match the trusted publisher's configured audience on Connect
      (whose default is "connect").
    required: false
    default: connect
  content-guid:
    description: Content GUID for the deployment (can be read from deployment-file)
    required: false
  deployment-file:
    description: Path to .posit deployment TOML file. If not specified and connect-server/content-guid are missing, auto-detects from .posit/publish/deployments/
    required: false
  path:
    description: Path to the application directory within the repository. Defaults to the repository root. All relative paths (deployment-file, manifest.json, requirements.txt, etc.) are resolved relative to this directory.
    required: false
    default: '.'
  draft:
    description: >-
      Deploy as a draft (preview) bundle rather than activating it. Drafts are
      uploaded to Connect but the previously active bundle keeps serving.
      Defaults to true on pull_request events and false otherwise. Set
      explicitly to override (e.g. 'false' to publish from a PR, 'true' to
      stage a draft from a push).
    required: false
    default: ${{ github.event_name == 'pull_request' }}
  github-token:
    description: GitHub token for commenting on PRs (required for pull_request events)
    required: false
  rsconnect-args:
    description: Additional arguments to pass to rsconnect deploy (entrypoint can be read from deployment-file)
    required: false
    default: ''

outputs:
  content-url:
    description: URL of the deployed content
    value: ${{ steps.deploy.outputs.content_url }}

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

    - name: Set up posit CLI
      shell: bash
      run: uv tool install "git+https://github.com/posit-dev/posit-cli"

    - name: Resolve deployment configuration
      id: config
      shell: bash
      working-directory: ${{ inputs.path }}
      run: uv run --project ${{ github.action_path }}/.. python -m connect_actions.cli resolve-config
      env:
        INPUT_CONNECT_SERVER: ${{ inputs.connect-server }}
        INPUT_CONTENT_GUID: ${{ inputs.content-guid }}
        INPUT_DEPLOYMENT_FILE: ${{ inputs.deployment-file }}

    - name: Log in to Connect
      shell: bash
      run: ${{ github.action_path }}/../scripts/login.sh
      env:
        CONNECT_SERVER: ${{ steps.config.outputs.connect_server }}
        CONNECT_API_KEY: ${{ inputs.connect-api-key }}
        OIDC_AUDIENCE: ${{ inputs.audience }}

    # Read the Connect version and decide which version-gated features to use.
    # Fails fast if a draft is requested on a server too old to support drafts;
    # sets send_metadata so the deploy step skips --metadata on older servers.
    - name: Check Connect capabilities
      id: capabilities
      shell: bash
      run: |
        CONNECT_VERSION=$(posit connect api server_settings -q '.version // empty' 2>/dev/null || true)
        export CONNECT_VERSION
        uv run --project ${{ github.action_path }}/.. python -m connect_actions.cli check-deploy-features
      env:
        DRAFT: ${{ inputs.draft }}

    - name: Generate requirements.txt if needed
      shell: bash
      working-directory: ${{ inputs.path }}
      run: ${{ github.action_path }}/scripts/generate-requirements.sh

    - name: Deploy to Connect
      id: deploy
      shell: bash
      working-directory: ${{ inputs.path }}
      run: ${{ github.action_path }}/scripts/deploy.sh
      env:
        CONTENT_GUID: ${{ steps.config.outputs.content_guid }}
        CONFIG_ENTRYPOINT: ${{ steps.config.outputs.entrypoint }}
        DRAFT: ${{ inputs.draft }}
        SEND_METADATA: ${{ steps.capabilities.outputs.send_metadata }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        PR_HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
        PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        PR_TITLE: ${{ github.event.pull_request.title || '' }}
        COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        RSCONNECT_ARGS: ${{ inputs.rsconnect-args }}

    - name: Comment preview URL on PR
      if: github.event_name == 'pull_request' && inputs.draft == 'true'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        PREVIEW_URL: ${{ steps.deploy.outputs.content_url }}
        CONTENT_GUID: ${{ steps.config.outputs.content_guid }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const previewUrl = process.env.PREVIEW_URL;
          const guid = process.env.CONTENT_GUID;
          const marker = 'Preview deployed to Connect';

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          // A PR may have previews on more than one environment, each with its
          // own comment. The content GUID is unique and appears in the preview
          // URL, so match on it to update this environment's comment (not some
          // other environment's). Only consider comments left by this repo's own
          // automation, so an untrusted commenter can't plant a marker+GUID
          // comment and hijack the preview bookkeeping that cleanup later trusts.
          const TRUSTED_ASSOCIATIONS = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
          const isTrusted = (c) =>
            c.user?.login === 'github-actions[bot]' ||
            TRUSTED_ASSOCIATIONS.has(c.author_association);
          const existing = comments.find(c => isTrusted(c) && c.body.includes(marker) && c.body.includes(guid));

          // We store all deployed bundle IDs in a hidden HTML comment within
          // the PR comment body. The cleanup-previews action parses this to
          // know which bundles to delete when the PR is closed.
          // Keep metadataPattern in sync with cleanup-previews/action.yml
          const metadataPattern = /<!-- preview-bundles:([\d,]+) -->/;
          const bundleIds = new Set();
          if (existing) {
            const metadataMatch = existing.body.match(metadataPattern);
            if (metadataMatch) {
              for (const id of metadataMatch[1].split(',')) {
                bundleIds.add(id);
              }
            }
          }

          // Extract the new bundle ID from the preview URL and add it
          const newBundleMatch = previewUrl.match(/draft\/(\d+)/);
          if (newBundleMatch) {
            bundleIds.add(newBundleMatch[1]);
          }

          const metadata = `<!-- preview-bundles:${[...bundleIds].join(',')} -->`;
          const shortSha = context.payload.pull_request.head.sha.substring(0, 7);
          // Name the server in the heading so multiple environments' comments
          // are distinguishable.
          const host = new URL(previewUrl).host;
          const body = `**Preview deployed to Connect** (\`${host}\`): [${previewUrl}](${previewUrl})\n\nDeployed from commit ${shortSha}.\n${metadata}`;

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    # Drop the stored credential so it doesn't outlive this action. `|| true`
    # tolerates the case where login never ran (e.g. an earlier step failed).
    - name: Log out of Connect
      if: always()
      shell: bash
      run: posit connect remove --name connect-actions || true
