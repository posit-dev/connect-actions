name: Deploy to Posit Connect
description: Deploy an application to Posit Connect. Supports production deploys and draft PR previews.

inputs:
  connect-server:
    description: Connect server URL (can be read from deployment-file)
    required: false
  connect-api-key:
    description: Connect API key
    required: true
  content-guid:
    description: Content GUID for the deployment (can be read from deployment-file)
    required: false
  deployment-file:
    description: Path to .posit deployment TOML file. If not specified and connect-server/content-guid are missing, auto-detects from .posit/publish/deployments/
    required: false
  path:
    description: Path to the application directory within the repository. Defaults to the repository root. All relative paths (deployment-file, manifest.json, requirements.txt, etc.) are resolved relative to this directory.
    required: false
    default: '.'
  github-token:
    description: GitHub token for commenting on PRs (required for pull_request events)
    required: false
  rsconnect-args:
    description: Additional arguments to pass to rsconnect deploy (entrypoint can be read from deployment-file)
    required: false
    default: ''

outputs:
  content-url:
    description: URL of the deployed content
    value: ${{ steps.deploy.outputs.content_url }}

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Set up rsconnect-python
      shell: bash
      run: uv tool install rsconnect-python --from "git+https://github.com/posit-dev/rsconnect-python"

    - name: Resolve deployment configuration
      id: config
      shell: bash
      working-directory: ${{ inputs.path }}
      run: ${{ github.action_path }}/scripts/resolve-config.sh
      env:
        INPUT_CONNECT_SERVER: ${{ inputs.connect-server }}
        INPUT_CONTENT_GUID: ${{ inputs.content-guid }}
        INPUT_DEPLOYMENT_FILE: ${{ inputs.deployment-file }}

    - name: Generate requirements.txt if needed
      shell: bash
      working-directory: ${{ inputs.path }}
      run: ${{ github.action_path }}/scripts/generate-requirements.sh

    - name: Deploy to Connect
      id: deploy
      shell: bash
      working-directory: ${{ inputs.path }}
      run: ${{ github.action_path }}/scripts/deploy.sh
      env:
        CONNECT_SERVER: ${{ steps.config.outputs.connect_server }}
        CONNECT_API_KEY: ${{ inputs.connect-api-key }}
        CONTENT_GUID: ${{ steps.config.outputs.content_guid }}
        CONFIG_ENTRYPOINT: ${{ steps.config.outputs.entrypoint }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        PR_HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
        PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        PR_TITLE: ${{ github.event.pull_request.title || '' }}
        COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        RSCONNECT_ARGS: ${{ inputs.rsconnect-args }}

    - name: Comment preview URL on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        PREVIEW_URL: ${{ steps.deploy.outputs.content_url }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const previewUrl = process.env.PREVIEW_URL;
          const marker = 'Preview deployed to Connect';

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body.includes(marker));

          // We store all deployed bundle IDs in a hidden HTML comment within
          // the PR comment body. The cleanup-previews action parses this to
          // know which bundles to delete when the PR is closed.
          // Keep metadataPattern in sync with cleanup-previews/action.yml
          const metadataPattern = /<!-- preview-bundles:([\d,]+) -->/;
          const bundleIds = new Set();
          if (existing) {
            const metadataMatch = existing.body.match(metadataPattern);
            if (metadataMatch) {
              for (const id of metadataMatch[1].split(',')) {
                bundleIds.add(id);
              }
            }
          }

          // Extract the new bundle ID from the preview URL and add it
          const newBundleMatch = previewUrl.match(/draft\/(\d+)/);
          if (newBundleMatch) {
            bundleIds.add(newBundleMatch[1]);
          }

          const metadata = `<!-- preview-bundles:${[...bundleIds].join(',')} -->`;
          const shortSha = context.payload.pull_request.head.sha.substring(0, 7);
          const body = `**Preview deployed to Connect**: [${previewUrl}](${previewUrl})\n\nDeployed from commit ${shortSha}.\n\n_Preview will be deleted when the PR is closed._\n${metadata}`;

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
