name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Serialize runs per ref: a new push cancels an in-progress run for the same PR
# or branch. The e2e legs share one PR's comment stream for their preview /
# cleanup bookkeeping, so overlapping runs would otherwise fight over it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Run pytest
        run: uv run pytest

  # Build the Quarto fixture's manifest in a job of its own, and hand it to
  # e2e-deploy as an artifact. `rsconnect write-manifest quarto` runs `quarto
  # inspect` locally, so *something* needs Quarto on PATH -- but if that Quarto
  # lived in the e2e-deploy job it would also satisfy the Quarto deploy legs,
  # masking a broken "Set up Quarto" step in the action under test. Isolating it
  # here keeps the e2e runner Quarto-free except for the Quarto the deploy action
  # installs itself, so those legs genuinely exercise that install.
  quarto-manifest:
    name: Build Quarto fixture manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2.2.0

      # No --override-python-version here: this job can't know which Python the
      # ephemeral Connect will have (that's resolved per-leg from the running
      # server in e2e-deploy, which pins the manifest's version after download).
      # `quarto inspect` reads the doc's metadata without executing it, so no
      # Python/Jupyter environment is needed.
      - name: Generate manifest for Quarto fixture
        run: |
          set -euo pipefail
          uvx --from "git+https://github.com/posit-dev/rsconnect-python" \
            rsconnect write-manifest quarto \
            --overwrite \
            tests/e2e/quarto-doc/report.qmd

      - name: Upload Quarto fixture manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quarto-manifest
          path: tests/e2e/quarto-doc/manifest.json
          if-no-files-found: error

  e2e-deploy:
    name: e2e (Connect ${{ matrix.connect-version }})
    needs: quarto-manifest
    # Fork PRs can't read secrets.CONNECT_LICENSE, so Connect can't start.
    # Skip on fork PRs rather than failing; same-repo PRs and pushes still run.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      # Run every version even if one fails, so a single version-specific
      # regression doesn't mask the others.
      fail-fast: false
      matrix:
        # Each version exercises a different slice of the supported range:
        #   * 2024.12.0 -- older than every version-gated feature. Draft
        #     previews (>=2025.07.0), git metadata (>=2025.12.0), and OIDC
        #     trusted publishing (>=2026.07.0) are all unavailable. Asserts the
        #     baseline still works: a plain API-key production deploy, with the
        #     draft/cleanup legs skipped (supports-drafts: false).
        #   * 2025.07.0 -- draft-capable. Runs the full suite; metadata is still
        #     silently skipped (needs 2025.12.0) but the deploy succeeds.
        #   * 2025.12.0 -- metadata floor. Full suite, with git metadata.
        #   * release   -- latest Connect build, to catch breakage early.
        # The action degrades gracefully where a feature is missing (#34/#49),
        # so older legs pass without it rather than failing.
        #
        # Each leg runs Connect on its own port so its server URL
        # (http://localhost:<port>) is unique. The legs run in parallel and all
        # post preview comments to the same PR; the deploy/cleanup bookkeeping
        # keys off the server URL, so distinct ports keep one leg from picking up
        # another's comments.
        include:
          - connect-version: "2024.12.0"
            supports-drafts: false
            port: 3939
          - connect-version: "2025.07.0"
            supports-drafts: true
            port: 3940
          - connect-version: "2025.12.0"
            supports-drafts: true
            port: 3941
          - connect-version: "release"
            supports-drafts: true
            port: 3942
    permissions:
      contents: read
      # Lets the deploy action comment the preview URL on the draft deploy below.
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      # The workflow's own steps (create records, verify bundles, ...) talk to
      # Connect through `posit connect api`, which reads CONNECT_SERVER /
      # CONNECT_API_KEY from the environment -- no login needed.
      - name: Set up posit CLI
        run: uv tool install "git+https://github.com/posit-dev/posit-cli"

      # Delete this leg's own leftover preview/cleanup comments from earlier runs
      # before deploying. Each run creates fresh content GUIDs (so the deploy
      # action posts a new comment rather than updating one), and the ephemeral
      # server is torn down at the end, so those comments would otherwise pile up
      # on the PR and make each cleanup fire 404 DELETEs against GUIDs that no
      # longer exist. Scoped to this leg's server URL (localhost:<port>) so
      # parallel legs never touch each other's comments.
      - name: Prune stale preview comments
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SERVER_HOST: localhost:${{ matrix.port }}
        with:
          github-token: ${{ github.token }}
          script: |
            const host = process.env.SERVER_HOST;
            // Paginate: a long-lived PR can accumulate more comments than fit on
            // one page, and the stale ones we need to prune may be on any page.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            for (const c of comments) {
              const mine = c.user?.login === 'github-actions[bot]';
              const ours = c.body.includes('Preview deployed to Connect') ||
                c.body.includes('Cleaned up');
              if (mine && ours && c.body.includes(host)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
                console.log(`Deleted stale comment ${c.id} for ${host}`);
              }
            }

      # Spin up a real Connect in Docker and keep it running for the rest of the
      # job. Outputs CONNECT_SERVER / CONNECT_API_KEY / CONTAINER_ID.
      - name: Start Connect
        id: connect
        uses: posit-dev/with-connect@0783dabdd24e360e985a4588ce1239c3dc31c542 # main
        with:
          version: ${{ matrix.connect-version }}
          port: ${{ matrix.port }}
          license: ${{ secrets.CONNECT_LICENSE }}

      # The deploy action updates existing content, so the records have to exist
      # first. A freshly created record has app_mode "unknown", which is why this
      # test deploys via a manifest.json (the one path that takes a new record
      # straight to deployed without an app_mode lookup). We create two records
      # so we can test a production deploy and a draft deploy independently.
      - name: Create content records
        id: create
        env:
          CONNECT_SERVER: ${{ steps.connect.outputs.CONNECT_SERVER }}
          CONNECT_API_KEY: ${{ steps.connect.outputs.CONNECT_API_KEY }}
        run: |
          set -euo pipefail
          create() {
            posit connect api v1/content -X POST -f name="$1" -q .guid
          }
          PROD_GUID=$(create connect-actions-e2e-prod)
          DRAFT_GUID=$(create connect-actions-e2e-draft)
          QUARTO_GUID=$(create connect-actions-e2e-quarto)
          for guid in "$PROD_GUID" "$DRAFT_GUID" "$QUARTO_GUID"; do
            [ -n "$guid" ] && [ "$guid" != "null" ] || { echo "Failed to create content record"; exit 1; }
          done
          echo "Created prod=$PROD_GUID draft=$DRAFT_GUID quarto=$QUARTO_GUID"
          echo "prod_guid=$PROD_GUID" >> "$GITHUB_OUTPUT"
          echo "draft_guid=$DRAFT_GUID" >> "$GITHUB_OUTPUT"
          echo "quarto_guid=$QUARTO_GUID" >> "$GITHUB_OUTPUT"

      # Connect matches a content's Python version exactly, so everything below
      # must target a version Connect actually has -- not whatever the runner
      # happens to use. (The manifest pins it explicitly; the non-manifest deploy
      # would otherwise infer the runner's Python.) Ask the server what's
      # installed and reuse it everywhere.
      - name: Resolve a Connect-supported Python version
        id: pyver
        env:
          CONNECT_SERVER: ${{ steps.connect.outputs.CONNECT_SERVER }}
          CONNECT_API_KEY: ${{ steps.connect.outputs.CONNECT_API_KEY }}
        run: |
          set -euo pipefail
          PY_VERSION=$(posit connect api v1/server_settings/python \
            -q '.installations | map(.version) | max_by(split(".") | map(tonumber))')
          echo "Connect has Python: $PY_VERSION"
          [ -n "$PY_VERSION" ] && [ "$PY_VERSION" != "null" ] || { echo "Could not determine Connect Python version"; exit 1; }
          echo "version=$PY_VERSION" >> "$GITHUB_OUTPUT"

      # Generate the manifest at test time so its file list doesn't drift from a
      # checked-in copy. Uses the same rsconnect source the action installs.
      - name: Generate manifest for fixture app
        run: |
          set -euo pipefail
          uvx --from "git+https://github.com/posit-dev/rsconnect-python" \
            rsconnect write-manifest fastapi \
            --overwrite \
            --entrypoint app:app \
            --override-python-version "${{ steps.pyver.outputs.version }}" \
            tests/e2e/fastapi-app

      # The Quarto fixture's manifest is built in the quarto-manifest job (so
      # this runner stays Quarto-free -- see that job's comment). Pull it into
      # the fixture directory where the deploy legs below expect it.
      - name: Download Quarto fixture manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: quarto-manifest
          path: tests/e2e/quarto-doc

      # Connect matches Python versions exactly (see above), but the manifest
      # job couldn't know which Python this leg's Connect has. Pin it now to the
      # version resolved from the running server, the same one the fastapi
      # manifest and the non-manifest deploys target.
      - name: Pin Quarto manifest to Connect's Python
        env:
          PY_VERSION: ${{ steps.pyver.outputs.version }}
        run: |
          set -euo pipefail
          MANIFEST=tests/e2e/quarto-doc/manifest.json
          jq --arg v "$PY_VERSION" '.python.version = $v' "$MANIFEST" > "$MANIFEST.tmp"
          mv "$MANIFEST.tmp" "$MANIFEST"
          echo "Pinned Quarto manifest Python to $PY_VERSION"

      # --- Production deploy (draft: false) -------------------------------------
      - name: Deploy (production)
        id: deploy-prod
        uses: ./deploy
        with:
          connect-server: ${{ steps.connect.outputs.CONNECT_SERVER }}
          connect-api-key: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          content-guid: ${{ steps.create.outputs.prod_guid }}
          path: tests/e2e/fastapi-app
          draft: "false"

      - name: Verify production deploy
        env:
          CONNECT_SERVER: ${{ steps.connect.outputs.CONNECT_SERVER }}
          CONNECT_API_KEY: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          CONTENT_URL: ${{ steps.deploy-prod.outputs['content-url'] }}
          GUID: ${{ steps.create.outputs.prod_guid }}
        run: |
          set -euo pipefail
          echo "content-url: $CONTENT_URL"
          [ -n "$CONTENT_URL" ] || { echo "ERROR: empty content-url"; exit 1; }
          case "$CONTENT_URL" in
            */draft/*) echo "ERROR: production deploy produced a draft URL"; exit 1 ;;
          esac
          COUNT=$(posit connect api "v1/content/$GUID/bundles" -q 'length')
          [ "$COUNT" -ge 1 ] || { echo "ERROR: no bundles created"; exit 1; }
          echo "Production deploy verified."

      # --- Non-manifest deploy (app_mode lookup) --------------------------------
      # The prod record now has app_mode "python-fastapi" from the deploy above,
      # so redeploying it *without* a manifest exercises the other deploy.sh
      # branch: query Connect for app_mode, map it to an rsconnect subcommand
      # (fastapi), and deploy. Also hits generate-requirements.sh's
      # "requirements.txt already exists" branch. Stage a manifest-free copy so
      # the action doesn't take the manifest path.
      - name: Stage manifest-free app copy
        run: |
          set -euo pipefail
          rm -rf "$RUNNER_TEMP/plain-app"
          cp -r tests/e2e/fastapi-app "$RUNNER_TEMP/plain-app"
          rm -f "$RUNNER_TEMP/plain-app/manifest.json"

      - name: Deploy (non-manifest, app_mode lookup)
        id: deploy-appmode
        uses: ./deploy
        with:
          connect-server: ${{ steps.connect.outputs.CONNECT_SERVER }}
          connect-api-key: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          content-guid: ${{ steps.create.outputs.prod_guid }}
          path: ${{ runner.temp }}/plain-app
          draft: "false"
          # No manifest here, so rsconnect builds one from the local env and would
          # otherwise pin the runner's Python (which Connect lacks). Target a
          # version Connect has, the way a real project would via .python-version.
          rsconnect-args: --override-python-version ${{ steps.pyver.outputs.version }}

      - name: Verify non-manifest deploy
        env:
          CONNECT_SERVER: ${{ steps.connect.outputs.CONNECT_SERVER }}
          CONNECT_API_KEY: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          CONTENT_URL: ${{ steps.deploy-appmode.outputs['content-url'] }}
          GUID: ${{ steps.create.outputs.prod_guid }}
        run: |
          set -euo pipefail
          echo "content-url: $CONTENT_URL"
          [ -n "$CONTENT_URL" ] || { echo "ERROR: empty content-url"; exit 1; }
          case "$CONTENT_URL" in
            */draft/*) echo "ERROR: non-manifest production deploy produced a draft URL"; exit 1 ;;
          esac
          # This is the prod record's second deploy, so it should now have >= 2 bundles.
          COUNT=$(posit connect api "v1/content/$GUID/bundles" -q 'length')
          [ "$COUNT" -ge 2 ] || { echo "ERROR: expected a second bundle on the prod record"; exit 1; }
          echo "Non-manifest deploy verified."

      # --- uv.lock deploy (generate-requirements.sh uv.lock branch) -------------
      # Stage a copy with a pyproject.toml + uv.lock and no requirements.txt, so
      # the action exercises generate-requirements.sh's uv.lock branch (export
      # the lockfile to requirements.txt). Generate the lockfile at test time so
      # it never drifts from a checked-in copy.
      - name: Stage uv.lock app copy
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/uvlock-app"
          rm -rf "$APP"
          cp -r tests/e2e/fastapi-app "$APP"
          rm -f "$APP/manifest.json" "$APP/requirements.txt"
          cat > "$APP/pyproject.toml" <<'EOF'
          [project]
          name = "connect-actions-e2e-uvlock"
          version = "0.1.0"
          requires-python = ">=3.11"
          dependencies = ["fastapi", "uvicorn"]
          EOF
          uv lock --project "$APP"

      - name: Deploy (uv.lock)
        id: deploy-uvlock
        uses: ./deploy
        with:
          connect-server: ${{ steps.connect.outputs.CONNECT_SERVER }}
          connect-api-key: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          content-guid: ${{ steps.create.outputs.prod_guid }}
          path: ${{ runner.temp }}/uvlock-app
          draft: "false"
          # No manifest, so rsconnect would otherwise pin the runner's Python.
          rsconnect-args: --override-python-version ${{ steps.pyver.outputs.version }}

      - name: Verify uv.lock deploy
        env:
          CONNECT_SERVER: ${{ steps.connect.outputs.CONNECT_SERVER }}
          CONNECT_API_KEY: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          CONTENT_URL: ${{ steps.deploy-uvlock.outputs['content-url'] }}
          GUID: ${{ steps.create.outputs.prod_guid }}
        run: |
          set -euo pipefail
          echo "content-url: $CONTENT_URL"
          [ -n "$CONTENT_URL" ] || { echo "ERROR: empty content-url"; exit 1; }
          case "$CONTENT_URL" in
            */draft/*) echo "ERROR: uv.lock production deploy produced a draft URL"; exit 1 ;;
          esac
          # Third deploy to the prod record, so it should now have >= 3 bundles.
          COUNT=$(posit connect api "v1/content/$GUID/bundles" -q 'length')
          [ "$COUNT" -ge 3 ] || { echo "ERROR: expected a third bundle on the prod record"; exit 1; }
          echo "uv.lock deploy verified."

      # --- TOML config resolution: tier 3 (auto-detect) -------------------------
      # The headline "commit the Posit Publisher TOML and let the action pick
      # everything up" workflow. Write a single deployment TOML under
      # .posit/publish/deployments/ carrying the server + GUID (+ entrypoint) and
      # deploy with NO explicit connect-server/content-guid, so config resolution
      # auto-detects the TOML and feeds the resolved server to login and the
      # resolved GUID + entrypoint to the deploy. Manifest-free so it takes the
      # app_mode-lookup path, which is the one that actually uses the resolved
      # entrypoint (the manifest path ignores it). Reuses the prod record, whose
      # app_mode is already python-fastapi from the deploys above.
      - name: Stage app copy with auto-detected deployment TOML
        env:
          CONNECT_SERVER: ${{ steps.connect.outputs.CONNECT_SERVER }}
          PROD_GUID: ${{ steps.create.outputs.prod_guid }}
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/toml-autodetect-app"
          rm -rf "$APP"
          cp -r tests/e2e/fastapi-app "$APP"
          rm -f "$APP/manifest.json"
          mkdir -p "$APP/.posit/publish/deployments"
          # A minimal subset of a real Posit Publisher deployment record: the
          # resolver reads only server_url, id, and configuration.entrypoint.
          cat > "$APP/.posit/publish/deployments/prod.toml" <<EOF
          server_url = "$CONNECT_SERVER"
          id = "$PROD_GUID"
          [configuration]
          entrypoint = "app:app"
          EOF

      - name: Deploy (TOML auto-detect, no explicit server/GUID)
        id: deploy-toml-autodetect
        uses: ./deploy
        with:
          # Deliberately omit connect-server and content-guid: they must be
          # resolved from the auto-detected TOML. An API key is still supplied
          # (OIDC trusted publishing isn't configured on the ephemeral server).
          connect-api-key: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          path: ${{ runner.temp }}/toml-autodetect-app
          draft: "false"
          rsconnect-args: --override-python-version ${{ steps.pyver.outputs.version }}

      - name: Verify TOML auto-detect deploy
        env:
          CONNECT_SERVER: ${{ steps.connect.outputs.CONNECT_SERVER }}
          CONNECT_API_KEY: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          CONTENT_URL: ${{ steps.deploy-toml-autodetect.outputs['content-url'] }}
          GUID: ${{ steps.create.outputs.prod_guid }}
        run: |
          set -euo pipefail
          echo "content-url: $CONTENT_URL"
          [ -n "$CONTENT_URL" ] || { echo "ERROR: empty content-url"; exit 1; }
          case "$CONTENT_URL" in
            */draft/*) echo "ERROR: production deploy produced a draft URL"; exit 1 ;;
          esac
          # Fourth deploy to the prod record, so it should now have >= 4 bundles.
          COUNT=$(posit connect api "v1/content/$GUID/bundles" -q 'length')
          [ "$COUNT" -ge 4 ] || { echo "ERROR: expected a fourth bundle on the prod record"; exit 1; }
          echo "TOML auto-detect deploy verified."

      # --- TOML config resolution: tier 2 (deployment-file input) ---------------
      # Same as tier 3, but the TOML lives outside .posit/publish/deployments/ and
      # is named explicitly via the deployment-file input (resolved relative to
      # the app path). Exercises the second resolution tier end-to-end.
      - name: Stage app copy with a non-default deployment TOML
        env:
          CONNECT_SERVER: ${{ steps.connect.outputs.CONNECT_SERVER }}
          PROD_GUID: ${{ steps.create.outputs.prod_guid }}
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/toml-file-app"
          rm -rf "$APP"
          cp -r tests/e2e/fastapi-app "$APP"
          rm -f "$APP/manifest.json"
          mkdir -p "$APP/deploy-config"
          cat > "$APP/deploy-config/prod.toml" <<EOF
          server_url = "$CONNECT_SERVER"
          id = "$PROD_GUID"
          [configuration]
          entrypoint = "app:app"
          EOF

      - name: Deploy (deployment-file, no explicit server/GUID)
        id: deploy-toml-file
        uses: ./deploy
        with:
          connect-api-key: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          path: ${{ runner.temp }}/toml-file-app
          deployment-file: deploy-config/prod.toml
          draft: "false"
          rsconnect-args: --override-python-version ${{ steps.pyver.outputs.version }}

      - name: Verify deployment-file deploy
        env:
          CONNECT_SERVER: ${{ steps.connect.outputs.CONNECT_SERVER }}
          CONNECT_API_KEY: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          CONTENT_URL: ${{ steps.deploy-toml-file.outputs['content-url'] }}
          GUID: ${{ steps.create.outputs.prod_guid }}
        run: |
          set -euo pipefail
          echo "content-url: $CONTENT_URL"
          [ -n "$CONTENT_URL" ] || { echo "ERROR: empty content-url"; exit 1; }
          case "$CONTENT_URL" in
            */draft/*) echo "ERROR: production deploy produced a draft URL"; exit 1 ;;
          esac
          # Fifth deploy to the prod record, so it should now have >= 5 bundles.
          COUNT=$(posit connect api "v1/content/$GUID/bundles" -q 'length')
          [ "$COUNT" -ge 5 ] || { echo "ERROR: expected a fifth bundle on the prod record"; exit 1; }
          echo "deployment-file deploy verified."

      # --- Quarto deploy: manifest bootstrap ------------------------------------
      # Deploy the Quarto fixture to its own record via the generated manifest.
      # As with the fastapi prod deploy, a freshly created record is app_mode
      # "unknown", so the manifest path is the one that takes it straight to
      # deployed. This also sets the record's app_mode to "quarto-static", which
      # the app_mode-lookup leg below relies on.
      - name: Deploy (Quarto, manifest)
        id: deploy-quarto-manifest
        uses: ./deploy
        with:
          connect-server: ${{ steps.connect.outputs.CONNECT_SERVER }}
          connect-api-key: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          content-guid: ${{ steps.create.outputs.quarto_guid }}
          path: tests/e2e/quarto-doc
          draft: "false"

      - name: Verify Quarto manifest deploy
        env:
          CONNECT_SERVER: ${{ steps.connect.outputs.CONNECT_SERVER }}
          CONNECT_API_KEY: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          CONTENT_URL: ${{ steps.deploy-quarto-manifest.outputs['content-url'] }}
          GUID: ${{ steps.create.outputs.quarto_guid }}
        run: |
          set -euo pipefail
          echo "content-url: $CONTENT_URL"
          [ -n "$CONTENT_URL" ] || { echo "ERROR: empty content-url"; exit 1; }
          case "$CONTENT_URL" in
            */draft/*) echo "ERROR: production deploy produced a draft URL"; exit 1 ;;
          esac
          APP_MODE=$(posit connect api "v1/content/$GUID" -q '.app_mode')
          [ "$APP_MODE" = "quarto-static" ] || { echo "ERROR: expected app_mode quarto-static, got $APP_MODE"; exit 1; }
          COUNT=$(posit connect api "v1/content/$GUID/bundles" -q 'length')
          [ "$COUNT" -ge 1 ] || { echo "ERROR: no bundles created"; exit 1; }
          echo "Quarto manifest deploy verified."

      # --- Quarto deploy: app_mode lookup via deployment TOML -------------------
      # Redeploy the Quarto record without a manifest, driven by a deployment
      # TOML that supplies the server/GUID/entrypoint. This is the leg that
      # actually exercises the Quarto-specific action code: the "Determine app
      # type" step looks up the record's app_mode (quarto-static, set by the
      # manifest deploy above), maps it to the `quarto` subcommand and reports
      # needs_quarto=true, which triggers the action's "Set up Quarto" step; then
      # deploy.sh passes the resolved entrypoint as the positional document
      # argument (Quarto has no --entrypoint flag). Manifest-free so it takes the
      # app_mode-lookup path.
      - name: Stage Quarto app copy with deployment TOML
        env:
          CONNECT_SERVER: ${{ steps.connect.outputs.CONNECT_SERVER }}
          QUARTO_GUID: ${{ steps.create.outputs.quarto_guid }}
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/quarto-toml-app"
          rm -rf "$APP"
          cp -r tests/e2e/quarto-doc "$APP"
          rm -f "$APP/manifest.json"
          mkdir -p "$APP/.posit/publish/deployments"
          cat > "$APP/.posit/publish/deployments/quarto.toml" <<EOF
          type = "quarto-static"
          server_url = "$CONNECT_SERVER"
          id = "$QUARTO_GUID"
          [configuration]
          entrypoint = "report.qmd"
          EOF

      - name: Deploy (Quarto, app_mode lookup)
        id: deploy-quarto-appmode
        uses: ./deploy
        with:
          connect-api-key: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          path: ${{ runner.temp }}/quarto-toml-app
          draft: "false"
          # No manifest, so `quarto inspect` would otherwise pin the runner's
          # Python. Target a version Connect has, as a real project would.
          rsconnect-args: --override-python-version ${{ steps.pyver.outputs.version }}

      - name: Verify Quarto app_mode deploy
        env:
          CONNECT_SERVER: ${{ steps.connect.outputs.CONNECT_SERVER }}
          CONNECT_API_KEY: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          CONTENT_URL: ${{ steps.deploy-quarto-appmode.outputs['content-url'] }}
          GUID: ${{ steps.create.outputs.quarto_guid }}
        run: |
          set -euo pipefail
          echo "content-url: $CONTENT_URL"
          [ -n "$CONTENT_URL" ] || { echo "ERROR: empty content-url"; exit 1; }
          case "$CONTENT_URL" in
            */draft/*) echo "ERROR: production deploy produced a draft URL"; exit 1 ;;
          esac
          # Second deploy to the Quarto record, so it should now have >= 2 bundles.
          COUNT=$(posit connect api "v1/content/$GUID/bundles" -q 'length')
          [ "$COUNT" -ge 2 ] || { echo "ERROR: expected a second bundle on the Quarto record"; exit 1; }
          echo "Quarto app_mode deploy verified."

      # --- Draft deploy (draft: true) -------------------------------------------
      # Draft previews require Connect >= 2025.07.0 (older servers fail fast), so
      # this and everything downstream (verify, cleanup) is skipped on the older
      # legs, which only assert the baseline API-key production deploy above.
      - name: Deploy (draft)
        id: deploy-draft
        if: matrix.supports-drafts
        uses: ./deploy
        with:
          connect-server: ${{ steps.connect.outputs.CONNECT_SERVER }}
          connect-api-key: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          content-guid: ${{ steps.create.outputs.draft_guid }}
          path: tests/e2e/fastapi-app
          draft: "true"
          github-token: ${{ github.token }}

      - name: Verify draft deploy
        if: matrix.supports-drafts
        env:
          CONNECT_SERVER: ${{ steps.connect.outputs.CONNECT_SERVER }}
          CONNECT_API_KEY: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          CONTENT_URL: ${{ steps.deploy-draft.outputs['content-url'] }}
          GUID: ${{ steps.create.outputs.draft_guid }}
        run: |
          set -euo pipefail
          echo "content-url: $CONTENT_URL"
          [ -n "$CONTENT_URL" ] || { echo "ERROR: empty content-url"; exit 1; }
          case "$CONTENT_URL" in
            */draft/*) ;;
            *) echo "ERROR: draft deploy did not produce a draft URL"; exit 1 ;;
          esac
          COUNT=$(posit connect api "v1/content/$GUID/bundles" -q 'length')
          [ "$COUNT" -ge 1 ] || { echo "ERROR: no bundles created"; exit 1; }
          echo "Draft deploy verified."

      # --- Cleanup previews -----------------------------------------------------
      # The draft deploy above commented its preview URL on this PR. Cleanup reads
      # that comment, parses the server + GUID + bundle straight from the URL, and
      # deletes the draft bundle. Only runs on pull_request, where the comment
      # exists. connect-server is passed to select this run's comment (the PR
      # accumulates comments from prior runs on other ephemeral servers).
      - name: Cleanup preview bundles
        if: github.event_name == 'pull_request' && matrix.supports-drafts
        uses: ./cleanup-previews
        with:
          connect-server: ${{ steps.connect.outputs.CONNECT_SERVER }}
          connect-api-key: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          github-token: ${{ github.token }}

      - name: Verify cleanup
        if: github.event_name == 'pull_request' && matrix.supports-drafts
        env:
          CONNECT_SERVER: ${{ steps.connect.outputs.CONNECT_SERVER }}
          CONNECT_API_KEY: ${{ steps.connect.outputs.CONNECT_API_KEY }}
          GUID: ${{ steps.create.outputs.draft_guid }}
        run: |
          set -euo pipefail
          COUNT=$(posit connect api "v1/content/$GUID/bundles" -q 'length')
          [ "$COUNT" -eq 0 ] || { echo "ERROR: expected 0 bundles after cleanup, found $COUNT"; exit 1; }
          echo "Cleanup verified: draft bundle deleted."

      - name: Stop Connect
        if: always()
        uses: posit-dev/with-connect@0783dabdd24e360e985a4588ce1239c3dc31c542 # main
        with:
          stop: ${{ steps.connect.outputs.CONTAINER_ID }}
