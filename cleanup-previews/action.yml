name: Cleanup Connect Preview Bundles
description: Delete draft bundles from Connect that were deployed for PR previews

inputs:
  connect-server:
    description: >-
      Connect server URL. Only needed to disambiguate when a PR has previews on
      more than one server (run one cleanup step per server). Otherwise it is
      inferred from the preview comment.
    required: false
  connect-api-key:
    description: >-
      Connect API key. If omitted, the action exchanges a GitHub OIDC token for
      a short-lived key via trusted publishing, which requires 'id-token: write'
      permission and a trusted publisher configured for this content on Connect.
      An API key is tied to a single server, so pair it with connect-server when
      a PR targets more than one.
    required: false
  audience:
    description: >-
      Audience to request for the GitHub OIDC token when connect-api-key is not
      set. Must match the trusted publisher's configured audience on Connect
      (whose default is "connect").
    required: false
    default: connect
  github-token:
    description: GitHub token for reading/commenting on PRs
    required: true

runs:
  using: composite
  steps:
    # Read the PR's preview comments and work out which bundles to delete on
    # which server. The deploy action embeds everything we need in the preview
    # URL (server + content GUID + bundle id) plus a hidden metadata block that
    # accumulates every bundle deployed over the PR's life.
    - name: Resolve preview bundles from PR comments
      id: resolve
      uses: actions/github-script@v9
      env:
        INPUT_CONNECT_SERVER: ${{ inputs.connect-server }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          // Use workflow_dispatch input if provided, otherwise use context
          const prNumber = context.payload.inputs?.pr_number || context.issue.number;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
          });

          // The preview URL is `${server}/connect/#/apps/${guid}/draft/${bundle}`,
          // so server, GUID, and the latest bundle id all come straight from it.
          // The substring before `/connect/` (rather than the URL origin) keeps
          // Connect instances hosted under a subpath working.
          const urlPattern = /(https?:\/\/\S+?)\/connect\/#\/apps\/([^/\s]+)\/draft\/(\d+)/;
          // Keep metadataPattern in sync with deploy/action.yml. It accumulates
          // every bundle deployed across the PR's pushes, not just the latest.
          const metadataPattern = /<!-- preview-bundles:([\d,]+) -->/;

          // server -> Map(guid -> Set(bundleId))
          const servers = new Map();
          for (const comment of comments) {
            if (!comment.body.includes('Preview deployed to Connect')) {
              continue;
            }
            const urlMatch = comment.body.match(urlPattern);
            if (!urlMatch) {
              console.log(`Skipping preview comment ${comment.id}: could not parse a Connect preview URL`);
              continue;
            }
            const [, server, guid, urlBundle] = urlMatch;

            const bundles = new Set();
            const metadataMatch = comment.body.match(metadataPattern);
            if (metadataMatch) {
              for (const id of metadataMatch[1].split(',')) {
                bundles.add(id);
              }
            } else {
              bundles.add(urlBundle);
            }

            if (!servers.has(server)) {
              servers.set(server, new Map());
            }
            const byGuid = servers.get(server);
            if (!byGuid.has(guid)) {
              byGuid.set(guid, new Set());
            }
            for (const id of bundles) {
              byGuid.get(guid).add(id);
            }
          }

          if (servers.size === 0) {
            console.log('No preview deployment comments found; nothing to clean up.');
            core.setOutput('connect_server', '');
            core.setOutput('targets', '[]');
            return;
          }

          // Pick the server to clean up in this step. An API key is tied to one
          // server, so when a PR has previews on several you run one cleanup
          // step per server and pass connect-server to select it.
          const inputServer = (process.env.INPUT_CONNECT_SERVER || '').replace(/\/+$/, '');
          let targetServer;
          if (inputServer) {
            targetServer = inputServer;
            if (!servers.has(targetServer)) {
              console.log(`No preview comments found for ${targetServer}; nothing to clean up.`);
              core.setOutput('connect_server', '');
              core.setOutput('targets', '[]');
              return;
            }
          } else if (servers.size === 1) {
            targetServer = [...servers.keys()][0];
          } else {
            core.setFailed(
              `This PR has previews on multiple Connect servers:\n` +
              [...servers.keys()].map(s => `  ${s}`).join('\n') +
              `\nRun one cleanup step per server, passing connect-server (and ` +
              `connect-api-key if you are not using OIDC) to select each one.`
            );
            return;
          }

          const targets = [...servers.get(targetServer)].map(([guid, bundles]) => ({
            guid,
            bundles: [...bundles],
          }));
          console.log(`Cleaning up ${targetServer}: ${JSON.stringify(targets)}`);
          core.setOutput('connect_server', targetServer);
          core.setOutput('targets', JSON.stringify(targets));

    - name: Get API key via OIDC
      id: oidc
      if: inputs.connect-api-key == '' && steps.resolve.outputs.connect_server != ''
      shell: bash
      run: ${{ github.action_path }}/../get-api-key/get-api-key.sh
      env:
        CONNECT_SERVER: ${{ steps.resolve.outputs.connect_server }}
        OIDC_AUDIENCE: ${{ inputs.audience }}

    - name: Delete preview bundles
      if: steps.resolve.outputs.connect_server != ''
      uses: actions/github-script@v9
      env:
        CONNECT_SERVER: ${{ steps.resolve.outputs.connect_server }}
        CONNECT_API_KEY: ${{ inputs.connect-api-key != '' && inputs.connect-api-key || steps.oidc.outputs.api_key }}
        TARGETS: ${{ steps.resolve.outputs.targets }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const prNumber = context.payload.inputs?.pr_number || context.issue.number;
          const connectServer = process.env.CONNECT_SERVER;
          const apiKey = process.env.CONNECT_API_KEY;
          const targets = JSON.parse(process.env.TARGETS);

          const deleted = [];
          for (const { guid, bundles } of targets) {
            for (const bundleId of bundles) {
              try {
                const response = await fetch(
                  `${connectServer}/__api__/v1/content/${guid}/bundles/${bundleId}`,
                  {
                    method: 'DELETE',
                    headers: {
                      'Authorization': `Key ${apiKey}`,
                    },
                  }
                );

                if (response.ok) {
                  console.log(`Deleted bundle ${bundleId} (content ${guid})`);
                  deleted.push(bundleId);
                } else {
                  const errorText = await response.text();
                  console.error(`Failed to delete bundle ${bundleId} (content ${guid}): ${response.status} ${errorText}`);
                }
              } catch (error) {
                console.error(`Error deleting bundle ${bundleId} (content ${guid}):`, error);
              }
            }
          }

          if (deleted.length > 0) {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `Cleaned up ${deleted.length} preview bundle(s) on ${connectServer}: ${deleted.join(', ')}`
            });
          }
