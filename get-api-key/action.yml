name: Get Connect API Key via OIDC
description: Exchange a GitHub OIDC token for a Posit Connect API key. Requires a trusted publisher to be configured for the target content on your Connect server.

inputs:
  connect-server:
    description: Connect server URL (e.g., https://connect.example.com)
    required: true
  audience:
    description: >-
      Audience to request for the GitHub OIDC token. Must match the audience
      configured on the trusted publisher in Connect (whose default is "connect").
    required: false
    default: connect

outputs:
  api-key:
    description: Connect API key obtained via OIDC token exchange
    value: ${{ steps.exchange.outputs.api_key }}

runs:
  using: composite
  steps:
    - name: Exchange OIDC token for Connect API key
      id: exchange
      shell: bash
      run: ${{ github.action_path }}/get-api-key.sh
      env:
        CONNECT_SERVER: ${{ inputs.connect-server }}
        OIDC_AUDIENCE: ${{ inputs.audience }}
